<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg:        #080a12;
  --card:      #0e1220;
  --card2:     #131829;
  --border:    rgba(255,255,255,0.06);
  --border-hi: rgba(120,180,255,0.3);
  --text:      #f0f4ff;
  --sub:       #6b7a9a;
  --dim:       #2a3450;
  --blue:      #5b9cf6;
  --blue-glow: rgba(91,156,246,0.18);
  --teal:      #34d9b5;
  --teal-glow: rgba(52,217,181,0.15);
  --amber:     #f5a623;
  --red:       #ff6b6b;
  --green:     #34d9b5;
  --font-head: 'Clash Display', sans-serif;
  --font-body: 'Instrument Sans', sans-serif;
  --safe-top:  env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── MODAL SCROLL LOCK ─── */
body.no-scroll {
  overflow: hidden;
}

/* ─── MESH BACKGROUND ─── */
.mesh {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.mesh-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.12;
  animation: float 12s ease-in-out infinite alternate;
}
.mb1 { width: 420px; height: 420px; background: #2563eb; top: -120px; right: -80px; animation-delay: 0s; }
.mb2 { width: 320px; height: 320px; background: #0f9b80; bottom: 60px; left: -100px; animation-delay: -4s; }
.mb3 { width: 200px; height: 200px; background: #7c3aed; top: 45%; left: 40%; animation-delay: -8s; }

@keyframes float {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(20px, 30px) scale(1.05); }
}

/* grid lines */
.mesh::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 44px 44px;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: rgba(8,10,18,0.7);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand { display: flex; flex-direction: column; }
.brand-name {
  font-family: var(--font-head); font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, #fff 30%, var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand-sub { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sub); margin-top: 1px; }
.header-chips { display: flex; gap: 8px; align-items: center; }

.chip {
  display: flex; align-items: center; gap: 5px; padding: 5px 11px;
  border-radius: 99px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border); background: var(--card); transition: all .25s;
}
.chip-score { color: var(--blue); border-color: rgba(91,156,246,0.25); background: rgba(91,156,246,0.08); }
.chip-score .val { font-family: var(--font-head); font-size: 14px; font-weight: 700; }
.chip-risk { color: var(--teal); border-color: rgba(52,217,181,0.25); background: rgba(52,217,181,0.07); }
.chip-risk.warn  { color: var(--amber); border-color: rgba(245,166,35,0.25); background: rgba(245,166,35,0.07); }
.chip-risk.crit  { color: var(--red);   border-color: rgba(255,107,107,0.25); background: rgba(255,107,107,0.07); }

/* ─── LAYOUT ─── */
.page { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }

/* ─── HERO BALANCE CARD ─── */
.hero-card {
  background: linear-gradient(135deg, #0e1830 0%, #0b1520 60%, #0a1d14 100%);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 28px 24px 24px; margin-bottom: 14px; position: relative; overflow: hidden;
  animation: fadeUp .5s ease both;
}
.hero-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(91,156,246,0.6) 50%, transparent 100%);
}
.hero-card::after {
  content: ''; position: absolute; bottom: -60px; right: -60px; width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(52,217,181,0.08) 0%, transparent 70%); pointer-events: none;
}
.hero-eyebrow { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sub); margin-bottom: 8px; }
.hero-amount { font-family: var(--font-head); font-size: 42px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; color: var(--text); margin-bottom: 4px; }
.hero-currency { font-size: 16px; color: var(--sub); font-weight: 500; margin-right: 4px; }
.hero-period { font-size: 13px; color: var(--teal); margin-bottom: 22px; font-weight: 500; }

/* progress ring-style bar */
.prog-bar-wrap { margin-bottom: 20px; }
.prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); margin-bottom: 7px; }
.prog-track { height: 6px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: visible; position: relative; }
.prog-fill {
  height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--teal), var(--blue));
  box-shadow: 0 0 12px rgba(52,217,181,0.4); transition: width .7s cubic-bezier(.34,1.56,.64,1), background .4s;
  position: relative; width: 0%;
}
.prog-fill::after {
  content: ''; position: absolute; right: -1px; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%; background: white; box-shadow: 0 0 8px rgba(255,255,255,0.6); transition: opacity .4s;
}
.prog-fill[style*="width: 0"]::after { opacity: 0; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-tile { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; }
.stat-tile .tl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); margin-bottom: 5px; }
.stat-tile .tv { font-family: var(--font-head); font-size: 20px; font-weight: 600; }
.tv.bad { color: var(--red); }
.stat-tile .tc { font-size: 10px; color: var(--sub); margin-top: 2px; }

/* ─── ACTION ROW ─── */
.action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; animation: fadeUp .5s .1s ease both; }
.act-btn {
  all: unset; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 18px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; transition: all .2s; text-align: center;
}
.act-btn:hover { background: var(--card2); border-color: var(--border-hi); transform: translateY(-2px); }
.act-btn:active { transform: scale(0.97); }
.act-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.ai-income  { background: rgba(52,217,181,0.12); box-shadow: 0 0 16px rgba(52,217,181,0.1); }
.ai-expense { background: rgba(255,107,107,0.12); box-shadow: 0 0 16px rgba(255,107,107,0.1); }
.ai-ob      { background: rgba(91,156,246,0.12);  box-shadow: 0 0 16px rgba(91,156,246,0.1); }
.act-label { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; color: var(--sub); text-transform: uppercase; }

/* ─── ACTIVITY CARD ─── */
.act-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; animation: fadeUp .5s .2s ease both; }
.act-card-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.act-card-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; }
.entry-count { font-size: 10px; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 99px; background: var(--card2); color: var(--sub); border: 1px solid var(--border); }
.act-empty { padding: 36px 20px; text-align: center; color: var(--sub); font-size: 13px; }
.act-empty .ee { font-size: 28px; margin-bottom: 8px; }

.entry { display: flex; align-items: center; gap: 13px; padding: 13px 20px; border-bottom: 1px solid var(--border); animation: slideIn .3s ease both; }
.entry:last-child { border-bottom: none; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

.entry-dot { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.dot-income  { background: rgba(52,217,181,0.1);  color: var(--teal); }
.dot-expense { background: rgba(255,107,107,0.1); color: var(--red); }
.dot-system  { background: rgba(91,156,246,0.1);  color: var(--blue); }
.dot-alert   { background: rgba(245,166,35,0.1);  color: var(--amber); }

.entry-info { flex: 1; min-width: 0; }
.entry-msg  { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.entry-meta { font-size: 10px; color: var(--sub); margin-top: 2px; letter-spacing: 0.03em; }
.entry-right { text-align: right; flex-shrink: 0; }
.entry-amt   { font-family: var(--font-head); font-size: 13px; font-weight: 600; }
.entry-time  { font-size: 10px; color: var(--sub); margin-top: 2px; }

/* ─── MODAL ─── */
.overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(5,7,15,0.75); backdrop-filter: blur(10px); align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet {
  width: 100%; max-width: 520px; background: var(--card); border: 1px solid var(--border); border-radius: 28px 28px 0 0;
  padding: 12px 22px calc(env(safe-area-inset-bottom, 0px) + 32px); animation: sheetUp .32s cubic-bezier(.32,1.1,.65,1) both; position: relative;
}
.sheet::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(91,156,246,0.5), transparent); }
@keyframes sheetUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.pill { width: 40px; height: 4px; background: var(--dim); border-radius: 99px; margin: 10px auto 22px; }
.sheet-title { font-family: var(--font-head); font-size: 22px; font-weight: 700; margin-bottom: 22px; color: var(--text); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sub); margin-bottom: 7px; font-weight: 500; }
.input-wrap { position: relative; }
.input-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 12px; color: var(--sub); font-weight: 600; pointer-events: none; }
input, select {
  width: 100%; padding: 13px 14px; background: var(--card2); border: 1px solid var(--border); color: var(--text);
  border-radius: 13px; font-family: var(--font-body); font-size: 15px; outline: none; appearance: none;
}
input.has-prefix { padding-left: 48px; }
input:focus, select:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(91,156,246,0.1); }
select option { background: #0e1220; }

.sheet-actions { display: grid; grid-template-columns: 1fr 1.6fr; gap: 10px; margin-top: 20px; }
.btn-cancel { all: unset; cursor: pointer; padding: 14px; text-align: center; background: var(--card2); border: 1px solid var(--border); border-radius: 14px; font-size: 14px; color: var(--sub); transition: all .2s; }
.btn-confirm { all: unset; cursor: pointer; padding: 14px; text-align: center; background: linear-gradient(135deg, var(--teal), var(--blue)); border-radius: 14px; font-family: var(--font-head); font-size: 15px; font-weight: 700; color: #05090f; transition: all .2s; }
.btn-add { all: unset; cursor: pointer; padding: 14px; text-align: center; background: rgba(91,156,246,0.1); border: 1px solid rgba(91,156,246,0.25); border-radius: 14px; font-size: 14px; font-weight: 600; color: var(--blue); width: 100%; display: block; margin-top: 12px;}

.divider { height: 1px; background: var(--border); margin: 18px 0; }
.ob-list { display: flex; flex-direction: column; gap: 7px; max-height: 180px; overflow-y: auto; margin-bottom: 8px; }
.ob-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 13px; background: var(--card2); border: 1px solid var(--border); border-radius: 11px; }
.ob-item .on { color: var(--text); font-weight: 500; font-size: 13px; display:block; margin-bottom: 2px;}
.ob-item .oa { color: var(--sub); font-size: 11px; }
.btn-settle { all: unset; cursor: pointer; background: rgba(52,217,181,0.15); color: var(--teal); font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 8px; transition: .2s; }
.btn-settle:hover { background: var(--teal); color: #000; }
.badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--dim); color: var(--sub); margin-left: 6px; text-transform: uppercase; }

.section-head { font-size: 11px; color: var(--sub); margin-bottom: 10px; font-weight: 500; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div class="mesh">
  <div class="mesh-blob mb1"></div>
  <div class="mesh-blob mb2"></div>
  <div class="mesh-blob mb3"></div>
</div>

<header>
  <div class="brand">
    <div class="brand-name">My Finance</div>
    <div class="brand-sub">Personal tracker · TZS</div>
  </div>
  <div class="header-chips">
    <div class="chip chip-score">
      <span style="font-size:9px;letter-spacing:.08em;color:var(--sub)">SCORE</span>
      <span class="val" id="scoreVal">100</span>
    </div>
    <div class="chip chip-risk" id="riskChip">● Stable</div>
  </div>
</header>

<div class="page">

  <div class="hero-card">
    <div class="hero-eyebrow">Total Balance Remaining</div>
    <div class="hero-amount">
      <span class="hero-currency">TZS</span><span id="heroAmt">0</span>
    </div>
    <div class="hero-period" id="heroSalaryText">Monthly Salary: Set to begin</div>

    <div class="prog-bar-wrap">
      <div class="prog-labels">
        <span>Weekly Spent</span>
        <span id="progPct">0%</span>
        <span>Target: <span id="targetLabel" style="color:var(--blue)">0</span></span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="progFill"></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-tile">
        <div class="tl">Total Spent</div>
        <div class="tv bad" id="spentVal">0</div>
        <div class="tc">TZS this week</div>
      </div>
      <div class="stat-tile">
        <div class="tl">Obligations</div>
        <div class="tv" id="obPendingVal" style="color:var(--amber)">0</div>
        <div class="tc">Pending Items</div>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="act-btn" onclick="openModal('income')">
      <div class="act-icon ai-income">↑</div>
      <div class="act-label">Income</div>
    </button>
    <button class="act-btn" onclick="openModal('expense')">
      <div class="act-icon ai-expense">↓</div>
      <div class="act-label">Expense</div>
    </button>
    <button class="act-btn" onclick="openModal('ob')">
      <div class="act-icon ai-ob">◎</div>
      <div class="act-label">Obligations</div>
    </button>
  </div>

  <div class="act-card">
    <div class="act-card-head">
      <div class="act-card-title">Activity</div>
      <div class="entry-count" id="entryCount">0 entries</div>
    </div>
    <div class="act-list" id="actList">
      <div class="act-empty">
        <div class="ee">💳</div>
        No transactions yet.<br>Add your salary to get started.
      </div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay" onclick="handleOvClick(event)">
  <div class="sheet" id="sheet">
    <div class="pill"></div>
    <div id="sheetBody"></div>
  </div>
</div>

<script>
/* ─── CONFIG ─── */
const API = "https://script.google.com/macros/s/AKfycbwyImNYwNMzyimPS9YONG3odor8OaZdPyccxaJtsEbGMdmWJJwH6MDWBap8vmwNqmAtrA/exec";
const FMT = n => Number(n).toLocaleString('en-TZ');

/* ─── STATE ─── */
let salary = 0;
let manualWeeklyTarget = 0;
let obligations = []; // { id, name, amt, type, isPaid }
let expenses = []; 
let entries = [];

/* ─── MODAL ─── */
function openModal(type) {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  document.body.classList.add('no-scroll'); // Locks background

  if (type === 'income') {
    document.getElementById('sheetBody').innerHTML = `
      <div class="sheet-title">Setup Income & Budget</div>
      <div class="field">
        <label>Monthly Salary</label>
        <div class="input-wrap">
          <span class="input-prefix">TZS</span>
          <input class="has-prefix" id="salaryIn" type="number" inputmode="numeric" placeholder="0" value="${salary || ''}" autofocus>
        </div>
      </div>
      <div class="field">
        <label>Your Weekly Budget Target</label>
        <div class="input-wrap">
          <span class="input-prefix">TZS</span>
          <input class="has-prefix" id="targetIn" type="number" inputmode="numeric" placeholder="0" value="${manualWeeklyTarget || ''}">
        </div>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" onclick="setSalary()">Confirm ↑</button>
      </div>
    `;
  }

  if (type === 'ob') {
    renderObligationsModal();
  }

  if (type === 'expense') {
    document.getElementById('sheetBody').innerHTML = `
      <div class="sheet-title">Log Expense</div>
      <div class="field">
        <label>Description</label>
        <input id="expName" placeholder="What did you spend on?" autofocus>
      </div>
      <div class="field">
        <label>Amount</label>
        <div class="input-wrap">
          <span class="input-prefix">TZS</span>
          <input class="has-prefix" id="expAmt" type="number" inputmode="numeric" placeholder="0">
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="cat">
          <option value="🍛 Food">🍛 Food</option>
          <option value="🚌 Transport">🚌 Transport</option>
          <option value="👨‍👩‍👧 Family">👨‍👩‍👧 Family</option>
          <option value="💼 Business">💼 Business</option>
          <option value="🎉 Leisure">🎉 Leisure</option>
          <option value="🏥 Health">🏥 Health</option>
          <option value="📱 Airtime">📱 Airtime</option>
        </select>
      </div>
      <div class="sheet-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" onclick="addExpense()">Save ↓</button>
      </div>
    `;
  }
}

function renderObligationsModal() {
  const pendingObs = obligations.filter(o => !o.isPaid);
  const settledObs = obligations.filter(o => o.isPaid);
  const pendingTotal = pendingObs.reduce((sum, o) => sum + o.amt, 0);

  let rows = pendingObs.length
    ? pendingObs.map(o => `
        <div class="ob-item">
          <div>
            <span class="on">${o.name} <span class="badge">${o.type}</span></span>
            <span class="oa">TZS ${FMT(o.amt)}</span>
          </div>
          <button class="btn-settle" onclick="settleOb(${o.id})">Settle</button>
        </div>`).join('')
    : `<div style="font-size:12px;color:var(--sub);text-align:center;padding:12px 0">All caught up!</div>`;

  let settledRows = settledObs.length 
    ? `<div class="divider"></div><div class="section-head">Settled this month</div>` + 
      settledObs.map(o => `
        <div class="ob-item" style="opacity:0.5">
          <div><span class="on" style="text-decoration:line-through">${o.name}</span></div>
          <span class="oa">Paid</span>
        </div>`).join('')
    : '';

  document.getElementById('sheetBody').innerHTML = `
    <div class="sheet-title">Obligations</div>
    <div style="display:flex; gap:10px;">
      <div class="field" style="flex:2">
        <label>Name</label>
        <input id="obName" placeholder="e.g. Rent..." autofocus>
      </div>
      <div class="field" style="flex:1">
        <label>Type</label>
        <select id="obType">
          <option value="recurring">Recurring</option>
          <option value="one-time">One-time</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Amount</label>
      <div class="input-wrap">
        <span class="input-prefix">TZS</span>
        <input class="has-prefix" id="obAmt" type="number" inputmode="numeric" placeholder="0">
      </div>
    </div>
    <button class="btn-add" onclick="addOb()">+ Add Obligation</button>
    
    <div class="divider"></div>
    
    <div class="section-head">
      <span style="color:var(--amber)">Pending (${pendingObs.length})</span>
      <span style="color:var(--text)">Total: TZS ${FMT(pendingTotal)}</span>
    </div>
    <div class="ob-list">${rows}</div>
    ${settledRows}
    
    <div style="margin-top:10px;">
      <button class="btn-cancel" style="width:100%; box-sizing:border-box" onclick="closeModal()">Close</button>
    </div>
  `;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.classList.remove('no-scroll'); // Unlocks background
}

function handleOvClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

/* ─── CLOUD ─── */
function cloud(sheet, data) {
  fetch(API + "?sheet=" + sheet, { method: "POST", body: JSON.stringify(data) }).catch(() => {});
}

/* ─── ACTIONS ─── */
function setSalary() {
  const s = Number(document.getElementById('salaryIn').value);
  const t = Number(document.getElementById('targetIn').value);
  if (!s || s <= 0) return;
  
  if (salary !== s) {
    addEntry('💰', `Salary recorded`, `TZS ${FMT(s)}`, 'income', s);
    cloud("INCOME", { source: "Salary", amount: s });
  }
  if (manualWeeklyTarget !== t && t > 0) {
    addEntry('🎯', `Weekly Budget Set`, `Target: TZS ${FMT(t)}`, 'system', 0);
  }
  
  salary = s;
  manualWeeklyTarget = t;
  closeModal(); update();
}

function addOb() {
  const name = document.getElementById('obName').value.trim();
  const amt  = Number(document.getElementById('obAmt').value);
  const type = document.getElementById('obType').value;
  if (!name || !amt) return;
  
  obligations.push({ id: Date.now(), name, amt, type, isPaid: false });
  addEntry('◎', `Obligation Added: ${name}`, `TZS ${FMT(amt)}`, 'system', amt);
  renderObligationsModal(); // Refresh modal view
  update();
}

function settleOb(id) {
  const ob = obligations.find(o => o.id === id);
  if (ob && !ob.isPaid) {
    ob.isPaid = true;
    addEntry('✅', `Settled: ${ob.name}`, `TZS ${FMT(ob.amt)}`, 'system', ob.amt);
    renderObligationsModal();
    update();
  }
}

function addExpense() {
  if (!salary) { alert("Please set your salary first to start tracking."); return; }
  const name = document.getElementById('expName').value.trim();
  const amt  = Number(document.getElementById('expAmt').value);
  const cat  = document.getElementById('cat').value;
  if (!name || !amt) return;
  
  expenses.push({ name, amt, cat });
  cloud("EXPENSES", { description: name, category: cat, amount: amt });
  addEntry(cat.split(' ')[0], name, `TZS ${FMT(amt)}`, 'expense', amt);
  closeModal(); update();
}

/* ─── ENGINE ─── */
function update() {
  const expSpent = expenses.reduce((s, e) => s + e.amt, 0);
  const settledObTotal = obligations.filter(o => o.isPaid).reduce((s, o) => s + o.amt, 0);
  const pendingObs = obligations.filter(o => !o.isPaid);
  
  // Total Balance Calculation (Salary - what has been settled - daily expenses)
  const totalBalance = salary - settledObTotal - expSpent;
  
  // Weekly Budget Progress Logic
  const target = manualWeeklyTarget || 1; 
  const ratio = expSpent / target;
  const pct = manualWeeklyTarget > 0 ? Math.min(ratio * 100, 100) : 0;

  // Update Hero text
  document.getElementById('heroAmt').textContent = FMT(Math.max(totalBalance, 0));
  if (salary > 0) {
    document.getElementById('heroSalaryText').textContent = `Monthly Salary: TZS ${FMT(salary)}`;
  }
  
  document.getElementById('targetLabel').textContent = FMT(manualWeeklyTarget);
  document.getElementById('spentVal').textContent  = FMT(expSpent);
  document.getElementById('obPendingVal').textContent = pendingObs.length;

  // Progress bar logic
  const fill = document.getElementById('progFill');
  fill.style.width = pct + '%';
  if (pct > 90) {
    fill.style.background = 'linear-gradient(90deg, var(--amber), var(--red))';
    fill.style.boxShadow  = '0 0 12px rgba(255,107,107,0.45)';
  } else if (pct > 70) {
    fill.style.background = 'linear-gradient(90deg, var(--blue), var(--amber))';
    fill.style.boxShadow  = '0 0 12px rgba(245,166,35,0.35)';
  } else {
    fill.style.background = 'linear-gradient(90deg, var(--teal), var(--blue))';
    fill.style.boxShadow  = '0 0 12px rgba(52,217,181,0.4)';
  }
  document.getElementById('progPct').textContent = manualWeeklyTarget > 0 ? pct.toFixed(0) + '%' : '0%';

  // Remaining color alert for total balance
  const rem = document.getElementById('heroAmt');
  rem.style.color = totalBalance < 0 ? 'var(--red)' : totalBalance < (salary * 0.15) ? 'var(--amber)' : 'var(--text)';

  // Score
  let score = totalBalance < 0 ? 20 : ratio > 0.8 ? 50 : ratio > 0.6 ? 70 : 90;
  if (!salary) score = 100;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('scoreVal').style.color = score >= 80 ? 'var(--teal)' : score >= 50 ? 'var(--amber)' : 'var(--red)';

  // Risk chip
  const rc = document.getElementById('riskChip');
  if (score >= 80) { rc.textContent = '● Stable'; rc.className = 'chip chip-risk'; }
  else if (score >= 50) { rc.textContent = '● Warning'; rc.className = 'chip chip-risk warn'; }
  else { rc.textContent = '● Critical'; rc.className = 'chip chip-risk crit'; }

  // Alert
  if (ratio > 0.9 && manualWeeklyTarget > 0) {
    if (!entries.find(e => e.msg === 'Near weekly budget limit')) {
      addEntry('⚠️', 'Near weekly budget limit', `${pct.toFixed(0)}% of target used`, 'alert', 0);
    }
  }
}
