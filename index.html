<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Finance V3 (Synced)</title>
</head>
<body>
<script>
// 🔥 CLEAN CORE LOGIC WITH GOOGLE SHEETS SYNC

const API = "https://script.google.com/macros/s/AKfycbyzB_oPLCkWJAxDe0D4_GPaWlJo5Ghpi0Jn_4qU-kM2YJ4778DWFAglFkHiiCrdvlTzrg/exec";

let salary = 0;
let weeklyTarget = 0;
let expenses = [];
let obligations = [];

// ─── API CORE ───
async function send(sheet, data) {
  try {
    await fetch(API + "?sheet=" + sheet, {
      method: "POST",
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function fetchData(sheet) {
  try {
    const res = await fetch(API + "?sheet=" + sheet);
    return await res.json();
  } catch(e) {
    return [];
  }
}

// ─── LOAD ALL DATA ───
async function init() {
  const inc = await fetchData("INCOME");
  const exp = await fetchData("EXPENSES");
  const obs = await fetchData("OBLIGATIONS");
  const set = await fetchData("SETTLED");

  salary = inc.length ? Number(inc[inc.length-1].amount) : 0;

  expenses = exp.map(e => ({
    name: e.description,
    amt: Number(e.amount),
    cat: e.category,
    date: new Date(e.timestamp || Date.now())
  }));

  obligations = obs.map(o => ({
    name: o.name,
    amt: Number(o.amount),
    type: o.type,
    isPaid: set.find(s => s.name === o.name)
  }));

  update();
}

// ─── ACTIONS ───
function setSalary(val, target) {
  salary = val;
  weeklyTarget = target;
  send("INCOME", { amount: val });
  update();
}

function addExpense(name, amt, cat) {
  expenses.push({ name, amt, cat, date: new Date() });
  send("EXPENSES", { description: name, amount: amt, category: cat });
  update();
}

function addOb(name, amt, type) {
  obligations.push({ name, amt, type, isPaid:false });
  send("OBLIGATIONS", { name, amount: amt, type });
  update();
}

function settle(name, amt) {
  let ob = obligations.find(o=>o.name===name);
  if(ob) ob.isPaid = true;
  send("SETTLED", { name, amount: amt });
  update();
}

// ─── ENGINE ───
function update() {
  let spent = expenses.reduce((s,e)=>s+e.amt,0);
  let paid = obligations.filter(o=>o.isPaid).reduce((s,o)=>s+o.amt,0);
  let balance = salary - spent - paid;

  // REAL TIME ENGINE
  let first = expenses.length ? expenses[0].date : new Date();
  let days = Math.max(1,(Date.now()-first)/86400000);
  let burn = spent/days;
  let daysLeft = burn ? Math.floor(balance/burn) : 999;

  console.log({balance, spent, burn, daysLeft});
}

// INIT
init();

</script>
</body>
</html>
