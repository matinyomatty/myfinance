<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Finance Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a12; --card: #0e1220; --card2: #131829;
  --border: rgba(255,255,255,0.06); --border-hi: rgba(120,180,255,0.3);
  --text: #f0f4ff; --sub: #6b7a9a; --dim: #2a3450;
  --blue: #5b9cf6; --teal: #34d9b5; --amber: #f5a623; --red: #ff6b6b;
  --font-head: 'Clash Display', sans-serif; --font-body: 'Instrument Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body); background: var(--bg); color: var(--text);
  min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
}

/* Modal Lock */
body.modal-open { overflow: hidden; position: fixed; width: 100%; }

.mesh { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.mesh-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.12; }
.mb1 { width: 400px; height: 400px; background: #2563eb; top: -100px; right: -50px; }

header {
  position: sticky; top: 0; z-index: 100; padding: 20px;
  background: rgba(8,10,18,0.8); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;
}

.brand-name { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: #fff; }

.page { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 20px 16px; }

/* HERO CARD */
.hero-card {
  background: linear-gradient(135deg, #0e1830 0%, #0b1520 100%);
  border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 16px;
}
.hero-amount { font-family: var(--font-head); font-size: 38px; font-weight: 700; margin: 8px 0; }
.hero-label { font-size: 11px; text-transform: uppercase; color: var(--sub); letter-spacing: 1px; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
.stat-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
.stat-box .val { font-family: var(--font-head); font-size: 18px; font-weight: 600; display: block; }
.stat-box .lbl { font-size: 10px; color: var(--sub); text-transform: uppercase; }

/* ACTIONS */
.action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.act-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 16px 8px; color: var(--sub); cursor: pointer; text-align: center;
}
.act-btn:active { transform: scale(0.95); }

/* OBLIGATION ITEMS */
.ob-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px; background: var(--card2); border-radius: 14px; margin-bottom: 8px;
  border: 1px solid var(--border); transition: 0.2s;
}
.ob-item.settled { opacity: 0.6; border-color: var(--teal); background: rgba(52,217,181,0.03); }
.ob-info { flex: 1; }
.ob-name { font-weight: 600; font-size: 14px; display: block; }
.ob-meta { font-size: 10px; color: var(--sub); text-transform: uppercase; }
.ob-check {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--dim);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.settled .ob-check { background: var(--teal); border-color: var(--teal); color: #000; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(5,7,15,0.85); backdrop-filter: blur(8px);
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  width: 100%; max-width: 520px; background: var(--card); border-radius: 24px 24px 0 0;
  padding: 24px; animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

input, select {
  width: 100%; padding: 12px; background: var(--card2); border: 1px solid var(--border);
  color: #fff; border-radius: 12px; margin-top: 6px; margin-bottom: 16px; outline: none;
}
.field-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
.btn-confirm {
  width: 100%; padding: 14px; background: var(--blue); color: #000;
  border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
}
</style>
</head>
<body>

<div class="mesh"><div class="mesh-blob mb1"></div></div>

<header>
  <div class="brand-name">My Finance</div>
  <div id="statusChip" style="font-size: 11px; color: var(--teal);">● System Live</div>
</header>

<div class="page">
  <div class="hero-card">
    <div class="hero-label">Weekly Budget Remaining</div>
    <div class="hero-amount">TZS <span id="remVal">0</span></div>
    
    <div class="stats-row">
      <div class="stat-box">
        <span class="lbl">Monthly Salary</span>
        <span class="val" id="salVal" style="color:var(--teal)">0</span>
      </div>
      <div class="stat-box">
        <span class="lbl">Weekly Target</span>
        <span class="val" id="targetVal" style="color:var(--blue)">0</span>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="act-btn" onclick="openModal('income')">💰 Salary</button>
    <button class="act-btn" onclick="openModal('ob')">◎ Oblig.</button>
    <button class="act-btn" onclick="openModal('expense')">↓ Spend</button>
  </div>

  <div id="obligationListSection">
    <h3 style="font-family: var(--font-head); font-size: 14px; margin-bottom: 12px; color: var(--sub);">MONTHLY OBLIGATIONS</h3>
    <div id="obContainer"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="sheet" id="sheet">
    <div id="sheetBody"></div>
  </div>
</div>

<script>
const FMT = n => Number(n).toLocaleString('en-TZ');
let salary = 0, weeklyTarget = 0, totalSpent = 0;
let obligations = [];

function openModal(type) {
  const body = document.getElementById('sheetBody');
  document.body.classList.add('modal-open');
  document.getElementById('overlay').classList.add('open');

  if (type === 'income') {
    body.innerHTML = `
      <h2 style="margin-bottom:16px">Setup Monthly</h2>
      <label class="hero-label">Total Monthly Salary</label>
      <input id="salIn" type="number" placeholder="e.g. 1500000" value="${salary||''}">
      <label class="hero-label">Manual Weekly Spending Target</label>
      <input id="targetIn" type="number" placeholder="e.g. 200000" value="${weeklyTarget||''}">
      <button class="btn-confirm" onclick="saveIncome()">Update Finance</button>
    `;
  }

  if (type === 'ob') {
    body.innerHTML = `
      <h2 style="margin-bottom:16px">Add Obligation</h2>
      <input id="obName" placeholder="Name (Rent, Loan, etc.)">
      <input id="obAmt" type="number" placeholder="Amount">
      <div class="field-row">
        <input type="checkbox" id="obRec" style="width:20px; margin:0"> 
        <label class="hero-label">Recurring Monthly</label>
      </div>
      <button class="btn-confirm" onclick="addOb()">Add to List</button>
      <button class="act-btn" style="width:100%; margin-top:10px" onclick="closeModal()">Close</button>
    `;
  }

  if (type === 'expense') {
    body.innerHTML = `
      <h2 style="margin-bottom:16px">Log Expense</h2>
      <input id="expAmt" type="number" placeholder="Amount TZS">
      <input id="expDesc" placeholder="Description">
      <button class="btn-confirm" onclick="addExpense()">Record Expense</button>
    `;
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.classList.remove('modal-open');
}

function saveIncome() {
  salary = Number(document.getElementById('salIn').value);
  weeklyTarget = Number(document.getElementById('targetIn').value);
  updateUI();
  closeModal();
}

function addOb() {
  const name = document.getElementById('obName').value;
  const amt = Number(document.getElementById('obAmt').value);
  const recurring = document.getElementById('obRec').checked;
  if(!name || !amt) return;
  
  obligations.push({ name, amt, recurring, settled: false });
  updateUI();
  closeModal();
}

function toggleSettled(index) {
  obligations[index].settled = !obligations[index].settled;
  updateUI();
}

function addExpense() {
  const amt = Number(document.getElementById('expAmt').value);
  if(!amt) return;
  totalSpent += amt;
  updateUI();
  closeModal();
}

function updateUI() {
  document.getElementById('salVal').textContent = FMT(salary);
  document.getElementById('targetVal').textContent = FMT(weeklyTarget);
  
  const remaining = weeklyTarget - totalSpent;
  document.getElementById('remVal').textContent = FMT(remaining);
  document.getElementById('remVal').style.color = remaining < 0 ? 'var(--red)' : 'var(--text)';

  const container = document.getElementById('obContainer');
  container.innerHTML = obligations.map((ob, i) => `
    <div class="ob-item ${ob.settled ? 'settled' : ''}">
      <div class="ob-info">
        <span class="ob-name">${ob.name}</span>
        <span class="ob-meta">TZS ${FMT(ob.amt)} • ${ob.recurring ? 'RECURRING' : 'ONCE-OFF'}</span>
      </div>
      <div class="ob-check" onclick="toggleSettled(${i})">
        ${ob.settled ? '✓' : ''}
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
