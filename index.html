<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO Financial OS v5</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:#d1d5db;
}

/* STATIC HEADER */
.header{
position:sticky;
top:0;
z-index:10;
background:#0b1224;
padding:12px;
border-bottom:1px solid #1f2a44;
}

.title{font-size:16px;font-weight:bold;}
.statusbar{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;opacity:.8}

/* CONTAINER */
.container{max-width:520px;margin:auto;padding:12px}

/* CARDS */
.card{
background:#0b1224;
border:1px solid #1f2a44;
border-radius:12px;
padding:12px;
margin-top:10px;
}

/* BUTTON BAR */
.bar{
display:flex;
gap:8px;
}

.bar button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#1d4ed8;
color:white;
font-weight:bold;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#0b1224;
padding:15px;
border-radius:12px;
width:90%;
max-width:400px;
border:1px solid #1f2a44;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
background:#111a2e;
border:1px solid #1f2a44;
color:white;
border-radius:8px;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;
}

/* COLORS */
.green{color:#22c55e}
.yellow{color:#facc15}
.red{color:#ef4444}

/* LOG */
.log{
font-size:13px;
border-top:1px solid #1f2a44;
margin-top:10px;
padding-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #1f2a44;
font-size:13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="title">💼 CFO FINANCIAL OS</div>
<div class="statusbar">
<div>Score: <span id="score">100</span></div>
<div id="risk">🟢 Stable</div>
</div>
</div>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<div style="display:flex;justify-content:space-between;">
<div>
<div style="font-size:12px;opacity:.7">Weekly Budget</div>
<div id="weeklyBudget">0</div>
</div>

<div>
<div style="font-size:12px;opacity:.7">Spent</div>
<div class="red" id="spent">0</div>
</div>

<div>
<div style="font-size:12px;opacity:.7">Remaining</div>
<div class="green" id="remaining">0</div>
</div>
</div>
</div>

<!-- COMMAND BAR -->
<div class="card">
<div class="bar">
<button onclick="openModal('income')">+ Income</button>
<button onclick="openModal('expense')">- Expense</button>
<button onclick="openModal('ob')">⚙ Obligations</button>
</div>
</div>

<!-- LOG -->
<div class="card">
<div style="font-weight:bold">📊 Activity Log</div>
<div class="log" id="log"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div id="modalTitle" style="font-weight:bold"></div>

<div id="modalBody"></div>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let salary=0;
let obligations=[];
let expenses=[];
let weeklyBudget=0;
let locked=false;

function openModal(type){
document.getElementById("modal").style.display="flex";

let body="";

if(type==="income"){
body=`
<input id="salaryInput" type="number" placeholder="Enter salary">
<button onclick="setSalary()">Confirm Salary</button>
`;
}

if(type==="ob"){
body=`
<input id="obName" placeholder="Obligation name">
<input id="obAmount" type="number" placeholder="Amount">
<button onclick="addOb()">Add Obligation</button>
<button onclick="lockBudget()">Lock Budget</button>
`;
}

if(type==="expense"){
body=`
<input id="expName" placeholder="Description">
<input id="expAmount" type="number" placeholder="Amount">

<select id="cat">
<option>Food</option>
<option>Transport</option>
<option>Family</option>
<option>Business</option>
<option>Leisure</option>
</select>

<button onclick="addExpense()">Add Expense</button>
`;
}

document.getElementById("modalBody").innerHTML=body;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* SALARY FLOW */
function setSalary(){
salary=Number(document.getElementById("salaryInput").value);
log("💰 Salary received: "+salary);
closeModal();
}

/* OBLIGATIONS */
function addOb(){
let name=document.getElementById("obName").value;
let amt=Number(document.getElementById("obAmount").value);
obligations.push({name,amt});
log("⚙ Obligation added: "+name+" "+amt);
}

/* LOCK SYSTEM */
function lockBudget(){
let totalOb=obligations.reduce((s,o)=>s+o.amt,0);
weeklyBudget=Math.floor((salary-totalOb)/4);
locked=true;
log("🔒 Budget locked. Weekly: "+weeklyBudget);
update();
closeModal();
}

/* EXPENSE */
function addExpense(){
if(!locked){alert("Lock budget first");return;}

let name=document.getElementById("expName").value;
let amt=Number(document.getElementById("expAmount").value);
let cat=document.getElementById("cat").value;

expenses.push({name,amt,cat});
log("🧾 "+name+" - "+amt);

update();
closeModal();
}

/* ENGINE */
function update(){

let spent=expenses.reduce((s,e)=>s+e.amt,0);
let remaining=weeklyBudget-spent;

document.getElementById("weeklyBudget").innerText=weeklyBudget;
document.getElementById("spent").innerText=spent;
document.getElementById("remaining").innerText=remaining;

/* SCORE ENGINE */
let ratio=spent/(weeklyBudget||1);
let score=100;

if(ratio>1) score=25;
else if(ratio>0.8) score=50;
else if(ratio>0.6) score=70;
else score=90;

document.getElementById("score").innerText=score;

/* RISK */
let risk=document.getElementById("risk");

if(score>=80) risk.innerHTML="🟢 Stable";
else if(score>=50) risk.innerHTML="🟡 Warning";
else risk.innerHTML="🔴 Critical";

/* AI STYLE WARNING */
if(ratio>0.9){
log("⚠ WARNING: You are close to exceeding weekly budget");
}
}

/* LOG */
function log(msg){
let div=document.getElementById("log");
div.innerHTML="<div class='item'>"+msg+"</div>"+div.innerHTML;
}

update();

</script>

</body>
</html>
