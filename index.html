<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Finance Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a12;
  --card: #0e1220;
  --card2: #131829;
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(120,180,255,0.3);
  --text: #f0f4ff;
  --sub: #6b7a9a;
  --dim: #2a3450;
  --blue: #5b9cf6;
  --teal: #34d9b5;
  --amber: #f5a623;
  --red: #ff6b6b;
  --font-head: 'Clash Display', sans-serif;
  --font-body: 'Instrument Sans', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* --- FIX: Background Lock --- */
body.modal-open {
  height: 100vh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* --- MESH BACKGROUND --- */
.mesh { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.mesh-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.12; animation: float 12s ease-in-out infinite alternate; }
.mb1 { width: 420px; height: 420px; background: #2563eb; top: -120px; right: -80px; }
.mb2 { width: 320px; height: 320px; background: #0f9b80; bottom: 60px; left: -100px; animation-delay: -4s; }
.mesh::after { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 44px 44px; }

@keyframes float { from { transform: translate(0, 0) scale(1); } to { transform: translate(20px, 30px) scale(1.05); } }

/* --- HEADER --- */
header {
  position: sticky; top: 0; z-index: 100;
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: rgba(8,10,18,0.7); backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
}
.brand-name { font-family: var(--font-head); font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #fff 30%, var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.chip { padding: 5px 11px; border-radius: 99px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); background: var(--card); }

/* --- HERO CARD --- */
.page { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }
.hero-card {
  background: linear-gradient(135deg, #0e1830 0%, #0b1520 60%, #0a1d14 100%);
  border: 1px solid var(--border); border-radius: 24px; padding: 28px 24px 24px; margin-bottom: 14px; position: relative; overflow: hidden;
}
.hero-amount { font-family: var(--font-head); font-size: 42px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin-bottom: 22px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-tile { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; }
.stat-tile .tl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); margin-bottom: 5px; }
.stat-tile .tv { font-family: var(--font-head); font-size: 20px; font-weight: 600; }

/* --- ACTION BUTTONS --- */
.action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.act-btn { all: unset; cursor: pointer; display: flex; flex-direction: column; align-items: center; padding: 18px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; transition: all .2s; }
.act-btn:hover { background: var(--card2); transform: translateY(-2px); border-color: var(--border-hi); }
.act-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 8px; }
.ai-income { background: rgba(52,217,181,0.12); color: var(--teal); }
.ai-expense { background: rgba(255,107,107,0.12); color: var(--red); }
.ai-ob { background: rgba(91,156,246,0.12); color: var(--blue); }

/* --- OBLIGATION CHECKLIST --- */
.ob-section { background: var(--card); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; margin-top: 14px; }
.ob-item { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: 0.3s; }
.ob-item.settled { background: rgba(52,217,181,0.02); opacity: 0.7; }
.ob-info { flex: 1; }
.ob-name { font-size: 14px; font-weight: 600; color: var(--text); }
.ob-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--dim); color: var(--sub); margin-left: 6px; vertical-align: middle; }
.ob-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
.settled .ob-check { background: var(--teal); border-color: var(--teal); color: #080a12; }

/* --- MODAL --- */
.overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(5,7,15,0.8); backdrop-filter: blur(12px); align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { width: 100%; max-width: 520px; background: var(--card); border-radius: 28px 28px 0 0; padding: 24px; animation: sheetUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
input, select { width: 100%; padding: 14px; background: var(--card2); border: 1px solid var(--border); color: #fff; border-radius: 14px; margin: 8px 0 16px; outline: none; }
.btn-confirm { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--teal), var(--blue)); border: none; border-radius: 14px; font-family: var(--font-head); font-weight: 700; color: #080a12; cursor: pointer; }
</style>
</head>
<body>

<div class="mesh">
  <div class="mesh-blob mb1"></div>
  <div class="mesh-blob mb2"></div>
</div>

<header>
  <div class="brand">
    <div class="brand-name">My Finance</div>
    <div style="font-size: 10px; color: var(--sub); text-transform: uppercase;">Tracker · TZS</div>
  </div>
  <div class="chip" id="riskChip" style="color: var(--teal); border-color: rgba(52,217,181,0.2);">● Live</div>
</header>

<div class="page">
  <div class="hero-card">
    <div class="tl" style="font-size: 10px; color: var(--sub); letter-spacing: 1px;">WEEKLY BUDGET REMAINING</div>
    <div class="hero-amount"><span style="font-size: 18px; color: var(--sub); margin-right: 8px;">TZS</span><span id="heroAmt">0</span></div>
    
    <div class="stats-grid">
      <div class="stat-tile">
        <div class="tl">Monthly Salary</div>
        <div class="tv" id="salVal" style="color: var(--teal);">0</div>
      </div>
      <div class="stat-tile">
        <div class="tl">Weekly Target</div>
        <div class="tv" id="targetVal" style="color: var(--blue);">0</div>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="act-btn" onclick="openModal('income')">
      <div class="act-icon ai-income">↑</div>
      <div class="tl" style="font-size: 10px; font-weight: 600;">SALARY</div>
    </button>
    <button class="act-btn" onclick="openModal('expense')">
      <div class="act-icon ai-expense">↓</div>
      <div class="tl" style="font-size: 10px; font-weight: 600;">EXPENSE</div>
    </button>
    <button class="act-btn" onclick="openModal('ob')">
      <div class="act-icon ai-ob">◎</div>
      <div class="tl" style="font-size: 10px; font-weight: 600;">OBLIG.</div>
    </button>
  </div>

  <div class="ob-section">
    <div style="padding: 18px 20px; border-bottom: 1px solid var(--border); font-family: var(--font-head); font-size: 14px; font-weight: 600;">Monthly Obligations</div>
    <div id="obList">
      <div style="padding: 40px 20px; text-align: center; color: var(--sub); font-size: 13px;">No obligations added yet.</div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="sheet" id="sheetBody"></div>
</div>

<script>
const FMT = n => Number(n).toLocaleString('en-TZ');
let salary = 0, weeklyTarget = 0, spent = 0, obligations = [];

function openModal(type) {
  const sheet = document.getElementById('sheetBody');
  document.body.classList.add('modal-open');
  document.getElementById('overlay').classList.add('open');

  if (type === 'income') {
    sheet.innerHTML = `
      <h2 style="font-family:var(--font-head); margin-bottom:20px;">Monthly Setup</h2>
      <label class="tl" style="font-size:10px; color:var(--sub);">MONTHLY SALARY (TZS)</label>
      <input id="salIn" type="number" placeholder="0" value="${salary||''}">
      <label class="tl" style="font-size:10px; color:var(--sub);">WEEKLY SPENDING TARGET (TZS)</label>
      <input id="targetIn" type="number" placeholder="0" value="${weeklyTarget||''}">
      <button class="btn-confirm" onclick="saveFinance()">Save & Lock Budget</button>
    `;
  } else if (type === 'ob') {
    sheet.innerHTML = `
      <h2 style="font-family:var(--font-head); margin-bottom:20px;">New Obligation</h2>
      <input id="obName" placeholder="Obligation Name (e.g. Rent)">
      <input id="obAmt" type="number" placeholder="Amount (TZS)">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
        <input type="checkbox" id="obRec" style="width:20px; margin:0;">
        <label style="font-size:13px; color:var(--sub);">Recurring monthly</label>
      </div>
      <button class="btn-confirm" onclick="addOb()">Add Obligation</button>
    `;
  } else if (type === 'expense') {
    sheet.innerHTML = `
      <h2 style="font-family:var(--font-head); margin-bottom:20px;">Log Expense</h2>
      <input id="expAmt" type="number" placeholder="Amount (TZS)" autofocus>
      <input id="expDesc" placeholder="Description">
      <button class="btn-confirm" onclick="addExpense()">Record Spend</button>
    `;
  }
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.classList.remove('modal-open');
}

function saveFinance() {
  salary = Number(document.getElementById('salIn').value);
  weeklyTarget = Number(document.getElementById('targetIn').value);
  update(); closeModal();
}

function addOb() {
  const name = document.getElementById('obName').value;
  const amt = Number(document.getElementById('obAmt').value);
  const rec = document.getElementById('obRec').checked;
  if(name && amt) {
    obligations.push({ name, amt, rec, settled: false });
    update(); closeModal();
  }
}

function addExpense() {
  const amt = Number(document.getElementById('expAmt').value);
  if(amt) {
    spent += amt;
    update(); closeModal();
  }
}

function toggleOb(i) {
  obligations[i].settled = !obligations[i].settled;
  update();
}

function update() {
  document.getElementById('salVal').textContent = FMT(salary);
  document.getElementById('targetVal').textContent = FMT(weeklyTarget);
  const rem = weeklyTarget - spent;
  document.getElementById('heroAmt').textContent = FMT(rem);
  document.getElementById('heroAmt').parentElement.style.color = rem < 0 ? 'var(--red)' : 'var(--text)';

  const obList = document.getElementById('obList');
  if(obligations.length === 0) {
    obList.innerHTML = `<div style="padding:40px 20px; text-align:center; color:var(--sub); font-size:13px;">No obligations added yet.</div>`;
  } else {
    obList.innerHTML = obligations.map((ob, i) => `
      <div class="ob-item ${ob.settled ? 'settled' : ''}">
        <div class="ob-info">
          <div class="ob-name">${ob.name} ${ob.rec ? '<span class="ob-tag">RECURRING</span>' : ''}</div>
          <div style="font-size:11px; color:var(--sub); margin-top:2px;">TZS ${FMT(ob.amt)}</div>
        </div>
        <div class="ob-check" onclick="toggleOb(${i})">${ob.settled ? '✓' : ''}</div>
      </div>
    `).join('');
  }
}
</script>
</body>
</html>
