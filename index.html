<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    font-weight: bold;
}

.small {
    font-size: 12px;
    opacity: 0.7;
}

.income { color: #22c55e; }
.expense { color: #ef4444; }

.list-item {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #334155;
}

h2 { margin: 5px 0; }

canvas {
    background: white;
    border-radius: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h2>💰 Finance Dashboard</h2>
        <div class="small">Mobile-first personal finance system</div>
    </div>

    <div class="card">
        <div class="row">
            <div>
                <div class="small">Balance</div>
                <h3 id="balance">0 TZS</h3>
            </div>
            <div>
                <div class="small">Income</div>
                <h3 class="income" id="income">0</h3>
            </div>
            <div>
                <div class="small">Expenses</div>
                <h3 class="expense" id="expense">0</h3>
            </div>
        </div>
    </div>

    <div class="card">
        <input id="desc" placeholder="Description">
        <input id="amount" type="number" placeholder="Amount">

        <select id="category">
            <option>Business</option>
            <option>Personal</option>
            <option>Family</option>
            <option>Transport</option>
            <option>Food</option>
        </select>

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button onclick="addTx()">+ Add Transaction</button>
    </div>

    <div class="card">
        <canvas id="chart"></canvas>
    </div>

    <div class="card">
        <h3>Transactions</h3>
        <div id="list"></div>
    </div>

</div>

<script>
let tx = JSON.parse(localStorage.getItem("tx")) || [];

function addTx() {
    const desc = document.getElementById("desc").value;
    const amount = Number(document.getElementById("amount").value);
    const category = document.getElementById("category").value;
    const type = document.getElementById("type").value;

    if (!desc || !amount) return;

    tx.push({ desc, amount, category, type, date: new Date() });

    localStorage.setItem("tx", JSON.stringify(tx));

    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";

    render();
}

function deleteTx(i) {
    tx.splice(i, 1);
    localStorage.setItem("tx", JSON.stringify(tx));
    render();
}

function render() {
    let income = 0;
    let expense = 0;

    const list = document.getElementById("list");
    list.innerHTML = "";

    tx.forEach((t, i) => {
        if (t.type === "income") income += t.amount;
        else expense += t.amount;

        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
            <div>
                <b>${t.desc}</b><br>
                <span class="small">${t.category}</span>
            </div>
            <div>
                <span class="${t.type}">
                    ${t.type === "income" ? "+" : "-"}${t.amount}
                </span>
                <button onclick="deleteTx(${i})">x</button>
            </div>
        `;
        list.appendChild(div);
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("balance").innerText = (income - expense) + " TZS";

    drawChart(income, expense);
}

function drawChart(income, expense) {
    const ctx = document.getElementById("chart");

    if (window.myChart) window.myChart.destroy();

    window.myChart = new Chart(ctx, {
        type: "doughnut",
        data: {
            labels: ["Income", "Expense"],
            datasets: [{
                data: [income, expense]
            }]
        }
    });
}

render();
</script>

</body>
</html>
