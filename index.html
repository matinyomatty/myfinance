<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial OS</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

.container {
    max-width: 520px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #111a2e;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}

h2,h3 { margin: 5px 0; }

input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    font-weight: bold;
}

.row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.small { font-size: 12px; opacity: 0.7; }

.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #facc15; }

.item {
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #1f2a44;
    padding:8px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>💰 Financial OS</h2>
<div class="small">Weekly Budget + Savings + Business + Life Tracker</div>
</div>

<!-- DASHBOARD -->
<div class="card">
<div class="row">
<div>
<div class="small">Weekly Budget</div>
<h3 id="budget">0</h3>
</div>

<div>
<div class="small">Spent</div>
<h3 class="red" id="spent">0</h3>
</div>

<div>
<div class="small">Remaining</div>
<h3 class="green" id="remaining">0</h3>
</div>
</div>
</div>

<!-- INPUT -->
<div class="card">
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option value="expense">Expense</option>
<option value="income">Income</option>
<option value="saving">Saving</option>
<option value="investment">Investment</option>
</select>

<select id="category">
<option>Weekly Living</option>
<option>Family Support</option>
<option>Business</option>
<option>Transport</option>
<option>Food</option>
</select>

<button onclick="add()">Add Entry</button>
</div>

<!-- LIST -->
<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || [];

let weeklyBudget = 250000; // YOU CAN CHANGE THIS

function add() {
    const desc = document.getElementById("desc").value;
    const amount = Number(document.getElementById("amount").value);
    const type = document.getElementById("type").value;
    const category = document.getElementById("category").value;

    if (!desc || !amount) return;

    data.push({desc, amount, type, category});
    localStorage.setItem("data", JSON.stringify(data));

    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";

    render();
}

function render() {
    let spent = 0;
    let income = 0;

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((t, i) => {

        if (t.type === "expense") spent += t.amount;
        if (t.type === "income") income += t.amount;

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <div>
                <b>${t.desc}</b><br>
                <span class="small">${t.category} • ${t.type}</span>
            </div>
            <div>${t.amount}</div>
        `;

        list.appendChild(div);
    });

    document.getElementById("budget").innerText = weeklyBudget;
    document.getElementById("spent").innerText = spent;

    let remaining = weeklyBudget - spent;
    document.getElementById("remaining").innerText = remaining;

}

render();
</script>

</body>
</html>
