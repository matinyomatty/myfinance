<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test</title></head><body>
<button id="smsBtn">SMS</button>
<div id="modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;padding:20px;z-index:999;">
  <textarea id="smsText" placeholder="Paste SMS"></textarea><br>
  <button id="parseBtn">Parse</button><br>
  <button id="closeModal">Close</button>
</div>
<script>
document.getElementById('smsBtn').addEventListener('click',function(){
  document.getElementById('modal').style.display='block';
});
document.getElementById('closeModal').addEventListener('click',function(){
  document.getElementById('modal').style.display='none';
});
document.getElementById('parseBtn').addEventListener('click',function(){
  var text=document.getElementById('smsText').value;
  var match=text.match(/TZS\s*([\d,]+)/);
  if(match) alert('Found: '+match[1].replace(/,/g,''));
  else alert('Could not parse');
});
</script>
</body></html>
