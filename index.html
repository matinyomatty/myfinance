<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO Financial OS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:#d1d5db;
}

.header{
position:sticky;
top:0;
background:#0b1224;
padding:12px;
border-bottom:1px solid #1f2a44;
}

.title{font-weight:bold;font-size:16px;}
.statusbar{display:flex;justify-content:space-between;font-size:12px;opacity:.8;margin-top:4px;}

.container{max-width:520px;margin:auto;padding:12px;}

.card{
background:#0b1224;
border:1px solid #1f2a44;
border-radius:12px;
padding:12px;
margin-top:10px;
}

.bar{
display:flex;
gap:8px;
}

.bar button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#1d4ed8;
color:white;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#0b1224;
padding:15px;
border-radius:12px;
width:90%;
max-width:400px;
border:1px solid #1f2a44;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
background:#111a2e;
border:1px solid #1f2a44;
color:white;
border-radius:8px;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;
}

.green{color:#22c55e}
.yellow{color:#facc15}
.red{color:#ef4444}

.log{
margin-top:10px;
font-size:13px;
border-top:1px solid #1f2a44;
padding-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #1f2a44;
}
</style>
</head>

<body>

<div class="header">
<div class="title">💼 CFO FINANCIAL OS</div>
<div class="statusbar">
<div>Score: <span id="score">100</span></div>
<div id="risk">🟢 Stable</div>
</div>
</div>

<div class="container">

<div class="card">
<div class="bar">
<button onclick="openModal('income')">+ Income</button>
<button onclick="openModal('expense')">- Expense</button>
<button onclick="openModal('ob')">⚙ Obligations</button>
</div>
</div>

<div class="card">
<div><b>Weekly Budget:</b> <span id="budget">0</span></div>
<div><b>Spent:</b> <span id="spent">0</span></div>
<div><b>Remaining:</b> <span id="remaining">0</span></div>
</div>

<div class="card">
<b>Activity Log</b>
<div class="log" id="log"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div id="modalBody"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* =========================
   CLOUD CONFIG
========================= */

const API = "https://script.google.com/macros/s/AKfycbwyImNYwNMzyimPS9YONG3odor8OaZdPyccxaJtsEbGMdmWJJwH6MDWBap8vmwNqmAtrA/exec";

/* =========================
   STATE
========================= */

let salary = 0;
let obligations = [];
let expenses = [];
let weeklyBudget = 0;
let locked = false;

/* =========================
   MODAL
========================= */

function openModal(type){
document.getElementById("modal").style.display="flex";

let html="";

if(type==="income"){
html=`
<h3>Salary Entry</h3>
<input id="salaryInput" type="number" placeholder="Enter salary">
<button onclick="setSalary()">Confirm</button>
`;
}

if(type==="ob"){
html=`
<h3>Obligation</h3>
<input id="obName" placeholder="Name">
<input id="obAmt" type="number" placeholder="Amount">
<button onclick="addOb()">Add</button>
<button onclick="lockBudget()">Lock Month</button>
`;
}

if(type==="expense"){
html=`
<h3>Expense</h3>
<input id="expName" placeholder="Description">
<input id="expAmt" type="number" placeholder="Amount">

<select id="cat">
<option>Food</option>
<option>Transport</option>
<option>Family</option>
<option>Business</option>
<option>Leisure</option>
</select>

<button onclick="addExpense()">Save</button>
`;
}

document.getElementById("modalBody").innerHTML=html;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* =========================
   CLOUD FUNCTIONS
========================= */

function sendToCloud(sheet, data){
fetch(API+"?sheet="+sheet,{
method:"POST",
body: JSON.stringify(data)
});
}

/* =========================
   SALARY
========================= */

function setSalary(){
salary = Number(document.getElementById("salaryInput").value);

log("💰 Salary received: "+salary);

sendToCloud("INCOME",{
source:"Salary",
amount:salary
});

closeModal();
}

/* =========================
   OBLIGATIONS
========================= */

function addOb(){
let name=document.getElementById("obName").value;
let amt=Number(document.getElementById("obAmt").value);

obligations.push({name,amt});

log("⚙ Obligation: "+name+" "+amt);
}

function lockBudget(){

let totalOb = obligations.reduce((s,o)=>s+o.amt,0);

weeklyBudget = Math.floor((salary-totalOb)/4);

locked=true;

log("🔒 Budget locked: "+weeklyBudget);

update();
closeModal();
}

/* =========================
   EXPENSE
========================= */

function addExpense(){
if(!locked){alert("Lock budget first");return;}

let name=document.getElementById("expName").value;
let amt=Number(document.getElementById("expAmt").value);
let cat=document.getElementById("cat").value;

expenses.push({name,amt,cat});

sendToCloud("EXPENSES",{
description:name,
category:cat,
amount:amt
});

log("🧾 "+name+" - "+amt);

update();
closeModal();
}

/* =========================
   ENGINE
========================= */

function update(){

let spent = expenses.reduce((s,e)=>s+e.amt,0);
let remaining = weeklyBudget - spent;

document.getElementById("budget").innerText=weeklyBudget;
document.getElementById("spent").innerText=spent;
document.getElementById("remaining").innerText=remaining;

/* SCORE */
let ratio = spent/(weeklyBudget||1);
let score = 100;

if(ratio>1) score=20;
else if(ratio>0.8) score=50;
else if(ratio>0.6) score=70;
else score=90;

document.getElementById("score").innerText=score;

/* RISK */
let risk=document.getElementById("risk");

if(score>=80) risk.innerHTML="🟢 Stable";
else if(score>=50) risk.innerHTML="🟡 Warning";
else risk.innerHTML="🔴 Critical";

/* AI STYLE ALERT */
if(ratio>0.9){
log("⚠ Risk: You are near weekly budget limit");
}
}

/* =========================
   LOG
========================= */

function log(msg){
document.getElementById("log").innerHTML =
"<div class='item'>"+msg+"</div>" +
document.getElementById("log").innerHTML;
}

update();

</script>

</body>
</html>
